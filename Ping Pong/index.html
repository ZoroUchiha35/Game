<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Pong</title>
  <link rel="stylesheet" href="styles.css" />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%231F2A44'/%3E%3Ctext x='50' y='70' font-size='64' text-anchor='middle' fill='%23FFE599' font-family='system-ui, sans-serif'%3E🎮%3C/text%3E%3C/svg%3E">
  
</head>
<body>
  <div class="container">
    <h1>Ping Pong</h1>
    <div id="scoreboard">
      <span id="leftScore">0</span>
      <span class="separator">—</span>
      <span id="rightScore">0</span>
    </div>
    <canvas id="game" width="800" height="500" tabindex="0"></canvas>
    <div class="instructions">
      Controls: Move mouse over the canvas or use Arrow Up / Arrow Down to move the left paddle.
      <br />
      First to 10 wins (you can change this in the script).
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
